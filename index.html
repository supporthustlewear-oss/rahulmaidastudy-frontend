
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0f172a] text-white font-sans min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 h-screen bg-[#070a16] border-r border-white/10 fixed p-5 flex flex-col justify-between">
            <div>
                <h2 class="text-2xl font-bold text-yellow-400">Rahul Maida</h2>
                <p class="text-xs text-slate-400">Real-time Mirror</p>
                <nav class="mt-10 space-y-4">
                    <a href="#" class="flex items-center gap-3 text-yellow-400 bg-yellow-400/10 p-2 rounded-lg">
                        <i data-lucide="layout-dashboard"></i> Batches
                    </a>
                </nav>
            </div>
            <a href="https://t.me/official_rahulmaida" target="_blank" class="bg-[#229ED9] p-3 rounded-xl flex items-center justify-center gap-2 font-bold hover:scale-105 transition">
                <i data-lucide="send"></i> Join Telegram
            </a>
        </div>

        <!-- Main Content -->
        <div class="ml-64 p-8 w-full">
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">Explore Batches</h1>
                <input type="text" id="search" placeholder="Search batches..." class="bg-slate-800 border border-white/10 p-2 rounded-lg w-1/3">
            </header>

            <div id="batch-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Batches Load Here -->
                <p class="text-slate-400">Loading latest batches from Rahul Maida's server...</p>
            </div>
        </div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR RENDER BACKEND URL LATER
        const API_BASE = "https://rahul-backend-7ag5.onrender.com";

        async function loadBatches() {
            try {
                const res = await fetch(`${API_BASE}/api/batches`);
                const data = await res.json();
                const grid = document.getElementById('batch-grid');
                grid.innerHTML = data.map(batch => `
                    <div class="bg-slate-900 border border-white/10 rounded-2xl overflow-hidden hover:border-yellow-400 transition cursor-pointer">
                        <img src="${batch.batchImage}" class="w-full h-48 object-cover">
                        <div class="p-4">
                            <h3 class="font-bold text-lg mb-2">${batch.batchName}</h3>
                            <p class="text-sm text-slate-400">${batch.byName}</p>
                            <button class="mt-4 w-full bg-white text-black py-2 rounded-lg font-bold">View Content</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('batch-grid').innerHTML = '<p class="text-red-400">Error connecting to server. Please check Your API URL.</p>';
            }
        }
        
        loadBatches();
        lucide.createIcons();
    </script>
</body>
</html>
