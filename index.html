<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rahul Maida Study - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid #1e293b; }
        input { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }
    </style>
</head>
<body class="bg-[#0b0f19] text-white">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        const API_URL = "https://your-app-name.onrender.com";

        function App() {
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [step, setStep] = useState('login'); // login, otp, dashboard
            const [token, setToken] = useState(localStorage.getItem('pw_token'));

            const handleSendOTP = async () => {
                const res = await fetch(`${API_URL}/api/login/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phone })
                });
                const data = await res.json();
                if(data.success) setStep('otp');
                else alert("Pehle PW App me register karein!");
            };

            const handleVerifyOTP = async () => {
                const res = await fetch(`${API_URL}/api/login/verify-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phone, otp })
                });
                const data = await res.json();
                if(data.data && data.data.token) {
                    localStorage.setItem('pw_token', data.data.token);
                    setToken(data.data.token);
                    setStep('dashboard');
                } else {
                    alert("Wrong OTP!");
                }
            };

            return (
                <div className="flex items-center justify-center min-h-screen p-4">
                    {step === 'login' && (
                        <div className="glass p-8 rounded-2xl w-full max-w-md text-center">
                            <h2 className="text-2xl font-bold mb-6 italic text-blue-400">Rahul Maida Study Login</h2>
                            <p className="text-sm text-gray-400 mb-6 font-bold">PW Account Se Login Karein</p>
                            <input type="text" placeholder="Phone Number (e.g. 9876543210)" 
                                className="w-full p-3 rounded-lg mb-4" onChange={(e)=>setPhone(e.target.value)} />
                            <button onClick={handleSendOTP} className="w-full bg-blue-600 py-3 rounded-lg font-bold">Get OTP</button>
                        </div>
                    )}

                    {step === 'otp' && (
                        <div className="glass p-8 rounded-2xl w-full max-w-md text-center">
                            <h2 className="text-2xl font-bold mb-4">OTP Verification</h2>
                            <p className="text-sm text-gray-400 mb-6">Enter OTP sent to {phone}</p>
                            <input type="text" placeholder="6 Digit OTP" 
                                className="w-full p-3 rounded-lg mb-4" onChange={(e)=>setOtp(e.target.value)} />
                            <button onClick={handleVerifyOTP} className="w-full bg-green-600 py-3 rounded-lg font-bold">Verify & Start Study</button>
                        </div>
                    )}

                    {step === 'dashboard' && (
                        <div className="w-full max-w-6xl">
                            <h1 className="text-3xl font-bold mb-8 italic">Welcome, Study Hard!</h1>
                            {/* Yaha batches wala code aayega jo pehle diya tha */}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
