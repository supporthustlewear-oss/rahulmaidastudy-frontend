<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study - Portal</title>
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE = "https://rahulmaidastudy-backend-1.onrender.com"; // UPDATE THIS

        function App() {
            const [user, setUser] = useState(localStorage.getItem('token'));
            const [step, setStep] = useState('login'); // login, otp, home
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [loading, setLoading] = useState(false);
            const [batches, setBatches] = useState([]);

            // Send OTP
            const handleSendOTP = async () => {
                setLoading(true);
                const res = await fetch(`${API_BASE}/api/login/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone })
                });
                const data = await res.json();
                if(data.success) setStep('otp');
                else alert("Error: Make sure you are registered on PW");
                setLoading(false);
            };

            // Verify OTP
            const handleVerifyOTP = async () => {
                setLoading(true);
                const res = await fetch(`${API_BASE}/api/login/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone, otp: otp })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('token', `Bearer ${data.data.token}`);
                    setUser(data.data.token);
                    setStep('home');
                } else {
                    alert("Wrong OTP!");
                }
                setLoading(false);
            };

            if (!user && step === 'login') {
                return (
                    <div className="flex items-center justify-center min-h-screen p-4">
                        <div className="glass p-8 rounded-2xl w-full max-w-md text-center">
                            <h2 className="text-3xl font-bold mb-6 text-blue-400">Rahul Maida Study</h2>
                            <p className="mb-6 text-gray-400">Login with PW Registered Number</p>
                            <input 
                                type="text" placeholder="Phone Number (10 digit)" 
                                className="w-full p-3 mb-4 bg-slate-800 border border-slate-700 rounded-lg text-white"
                                onChange={(e) => setPhone(e.target.value)}
                            />
                            <button 
                                onClick={handleSendOTP} disabled={loading}
                                className="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition-all"
                            >
                                {loading ? 'Sending...' : 'Send OTP'}
                            </button>
                        </div>
                    </div>
                );
            }

            if (!user && step === 'otp') {
                return (
                    <div className="flex items-center justify-center min-h-screen p-4">
                        <div className="glass p-8 rounded-2xl w-full max-w-md text-center">
                            <h2 className="text-2xl font-bold mb-4">Enter OTP</h2>
                            <input 
                                type="text" placeholder="6 Digit OTP" 
                                className="w-full p-3 mb-4 bg-slate-800 border border-slate-700 rounded-lg text-white text-center text-xl tracking-widest"
                                onChange={(e) => setOtp(e.target.value)}
                            />
                            <button 
                                onClick={handleVerifyOTP} disabled={loading}
                                className="w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-bold"
                            >
                                {loading ? 'Verifying...' : 'Login Now'}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6">
                    <nav className="flex justify-between items-center mb-10">
                        <h1 className="text-2xl font-bold italic text-blue-400">RAHUL MAIDA STUDY</h1>
                        <button onClick={() => { localStorage.clear(); location.reload(); }} className="text-red-400 underline">Logout</button>
                    </nav>
                    <div className="text-center py-20">
                        <h2 className="text-3xl mb-4">Welcome to Your Portal!</h2>
                        <p className="text-gray-400">Batches will appear here after sync.</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
