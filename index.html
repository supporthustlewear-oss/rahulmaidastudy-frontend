<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; }
        .glass { background: #1e293b; border: 1px solid #334155; }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE = "https://rahulmaidastudy-backend-1.onrender.com"; 

        // Session logic
        const getRID = () => {
            let id = sessionStorage.getItem('sid');
            if(!id) {
                id = 'pw-' + Math.random().toString(36).substr(2, 16);
                sessionStorage.setItem('sid', id);
            }
            return id;
        }

        function App() {
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);

            const send = async () => {
                if(phone.length < 10) return alert("Pehle 10-digit number toh daalo bhai!");
                setLoading(true);
                try {
                    const r = await fetch(`${API_BASE}/api/login/send-otp`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ phoneNumber: phone, randomId: getRID() })
                    });
                    const d = await r.json();
                    if(d.success) setStep(2); 
                    else alert(d.message || "Failed to send OTP");
                } catch(e) { alert("Backend link error! Check Render."); }
                setLoading(false);
            }

            const verify = async () => {
                setLoading(true);
                try {
                    const r = await fetch(`${API_BASE}/api/login/verify-otp`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ phoneNumber: phone, otp: otp, randomId: getRID() })
                    });
                    const d = await r.json();
                    if(d.success) {
                        alert("Bhai Waah! Login Done.");
                        localStorage.setItem('token', d.data.token);
                    } else {
                        alert("Error: " + d.message);
                    }
                } catch(e) { alert("Verify failed!"); }
                setLoading(false);
            }

            return (
                <div className="glass p-8 rounded-[2rem] w-full max-w-sm shadow-2xl">
                    <h1 className="text-2xl font-black text-center text-blue-500 mb-8 tracking-tighter">RAHUL MAIDA STUDY</h1>
                    
                    {step === 1 ? (
                        <div className="space-y-4">
                            <input 
                                type="tel" maxLength="10" placeholder="Mobile Number" 
                                className="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-center text-xl outline-none"
                                value={phone} onChange={e => setPhone(e.target.value)}
                            />
                            <button 
                                onClick={send} disabled={loading}
                                className="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold flex justify-center items-center"
                            >
                                {loading && <div className="loader w-5 h-5 border-2 rounded-full mr-2"></div>}
                                {loading ? "Bheja ja raha hai..." : "Get OTP"}
                            </button>
                        </div>
                    ) : (
                        <div className="space-y-4">
                            <input 
                                id="otp-field-new" name="no-autofill" type="text" maxLength="6" placeholder="******" 
                                className="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-center text-3xl tracking-[12px] outline-none"
                                value={otp} onChange={e => setOtp(e.target.value)}
                            />
                            <button 
                                onClick={verify} disabled={loading}
                                className="w-full bg-green-600 hover:bg-green-700 p-4 rounded-xl font-bold flex justify-center items-center"
                            >
                                {loading && <div className="loader w-5 h-5 border-2 rounded-full mr-2"></div>}
                                {loading ? "Check ho raha..." : "Verify & Login"}
                            </button>
                            <p onClick={() => setStep(1)} className="text-center text-slate-500 text-sm cursor-pointer underline">Number Badlein</p>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
