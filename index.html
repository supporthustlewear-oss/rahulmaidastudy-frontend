<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study - Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE = "https://rahulmaidastudy-backend-1.onrender.com"; 

        // Browser ki memory mein ek fixed ID save kar rahe hain
        const getSessionId = () => {
            let id = localStorage.getItem('my_rid');
            if(!id) {
                id = 'dd85b4b1-abad-4e' + Math.random().toString(16).slice(2, 8) + '-3dfc63cba741';
                localStorage.setItem('my_rid', id);
            }
            return id;
        };

        function App() {
            const [step, setStep] = useState('phone');
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [loading, setLoading] = useState(false);
            const [status, setStatus] = useState(!!localStorage.getItem('token'));

            const onSend = async () => {
                setLoading(true);
                const res = await fetch(`${API_BASE}/api/login/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        phoneNumber: phone, 
                        randomId: getSessionId() 
                    })
                });
                const data = await res.json();
                if(data.success) setStep('otp');
                else alert("Error: " + data.message);
                setLoading(false);
            };

            const onVerify = async () => {
                setLoading(true);
                const res = await fetch(`${API_BASE}/api/login/verify-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        phoneNumber: phone, 
                        otp: otp, 
                        randomId: getSessionId() 
                    })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('token', data.data.token);
                    setStatus(true);
                } else {
                    alert("Galat OTP: " + data.message);
                }
                setLoading(false);
            };

            if(status) return (
                <div className="p-10 text-center">
                    <h1 className="text-4xl font-bold text-blue-500 mb-6 underline">Rahul Maida Study</h1>
                    <div className="glass p-12 rounded-3xl inline-block">
                        <h2 className="text-2xl mb-4">Login Successful!</h2>
                        <button onClick={() => {localStorage.clear(); location.reload();}} className="text-red-400 font-bold">LOGOUT</button>
                    </div>
                </div>
            );

            return (
                <div className="flex items-center justify-center min-h-screen p-4">
                    <div className="glass p-8 rounded-[40px] w-full max-w-sm shadow-2xl">
                        <div className="w-20 h-20 bg-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center text-3xl">🎓</div>
                        <h2 className="text-2xl font-black text-center mb-10 text-blue-400 tracking-tight">RAHUL MAIDA STUDY</h2>
                        
                        {step === 'phone' ? (
                            <div className="space-y-6">
                                <input 
                                    type="tel" placeholder="Mobile Number" 
                                    className="w-full bg-slate-900/50 border-2 border-slate-700 p-4 rounded-2xl text-xl text-center outline-none focus:border-blue-500"
                                    onChange={(e) => setPhone(e.target.value)}
                                />
                                <button onClick={onSend} className="w-full bg-blue-600 p-4 rounded-2xl font-bold text-xl hover:bg-blue-700">Get OTP</button>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <input 
                                    type="text" placeholder="Enter 6-Digit OTP" 
                                    className="w-full bg-slate-900/50 border-2 border-slate-700 p-4 rounded-2xl text-2xl text-center tracking-[8px] outline-none focus:border-green-500"
                                    value={otp} onChange={(e) => setOtp(e.target.value)}
                                />
                                <button onClick={onVerify} className="w-full bg-green-600 p-4 rounded-2xl font-bold text-xl hover:bg-green-700">Login Now</button>
                                <button onClick={() => setStep('phone')} className="w-full text-slate-500 font-bold text-sm">Change Number</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
