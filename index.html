<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        input::placeholder { color: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const API_BASE = "https://rahulmaidastudy-backend-1.onrender.com"; 

        function App() {
            const [step, setStep] = useState('phone'); 
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [loading, setLoading] = useState(false);
            const [isLogged, setIsLogged] = useState(false);

            const handleSend = async () => {
                setLoading(true);
                const res = await fetch(`${API_BASE}/api/login/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phoneNumber: phone })
                });
                const data = await res.json();
                if(data.success) { setStep('otp'); setOtp(''); }
                else alert(data.message || "Failed to send OTP");
                setLoading(false);
            };

            const handleVerify = async () => {
                setLoading(true);
                const res = await fetch(`${API_BASE}/api/login/verify-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phoneNumber: phone, otp: otp })
                });
                const data = await res.json();
                if(data.success) {
                    setIsLogged(true);
                    localStorage.setItem('pw_token', data.data.token);
                } else {
                    alert(data.message || "Wrong OTP!");
                }
                setLoading(false);
            };

            if(isLogged) return (
                <div className="p-10 text-center">
                    <h1 className="text-3xl text-blue-400 font-bold mb-4">RAHUL MAIDA STUDY</h1>
                    <div className="glass p-8 rounded-2xl">Login Success! Redirecting to batches...</div>
                </div>
            );

            return (
                <div className="flex items-center justify-center min-h-screen p-4 bg-[#020617]">
                    <div className="glass p-8 rounded-3xl w-full max-w-sm shadow-2xl">
                        <h2 className="text-2xl font-bold mb-8 text-center bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">Rahul Maida Study</h2>
                        
                        {step === 'phone' ? (
                            <div className="space-y-6">
                                <div>
                                    <label className="text-xs text-slate-500 font-bold uppercase block mb-2">Mobile Number</label>
                                    <input 
                                        type="tel" autoComplete="off" placeholder="Phone Number" 
                                        className="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white text-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                        value={phone} onChange={(e) => setPhone(e.target.value)}
                                    />
                                </div>
                                <button onClick={handleSend} disabled={loading} className="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold transition-all">
                                    {loading ? 'Sending...' : 'Get OTP'}
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div>
                                    <label className="text-xs text-slate-500 font-bold uppercase block mb-2">6-Digit OTP</label>
                                    <input 
                                        type="text" autoComplete="one-time-code" placeholder="Enter OTP" 
                                        className="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white text-center text-2xl tracking-widest focus:ring-2 focus:ring-blue-500 outline-none"
                                        value={otp} onChange={(e) => setOtp(e.target.value)}
                                    />
                                </div>
                                <button onClick={handleVerify} disabled={loading} className="w-full bg-green-600 hover:bg-green-700 p-4 rounded-xl font-bold transition-all">
                                    {loading ? 'Verifying...' : 'Verify Login'}
                                </button>
                                <button onClick={() => setStep('phone')} className="w-full text-sm text-slate-500">Back & Change Number</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
