<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white flex items-center justify-center h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const API_BASE = "https://rahulmaidastudy-backend-1.onrender.com"; 

        function App() {
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);

            const onSend = async () => {
                setLoading(true);
                const r = await fetch(`${API_BASE}/api/login/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phoneNumber: phone })
                });
                const d = await r.json();
                if(d.success) setStep(2); else alert(d.message || "Failed to send");
                setLoading(false);
            }

            const onVerify = async () => {
                setLoading(true);
                const r = await fetch(`${API_BASE}/api/login/verify-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phoneNumber: phone, otp: otp })
                });
                const d = await r.json();
                if(d.success) {
                    localStorage.setItem('token', d.data.token);
                    alert("LOGIN SUCCESS!");
                    window.location.reload();
                } else {
                    alert(d.message || "OTP Galat Hai!");
                }
                setLoading(false);
            }

            return (
                <div className="bg-[#1e293b] p-8 rounded-3xl w-full max-w-sm border border-slate-700 shadow-2xl">
                    <h1 className="text-2xl font-bold text-center text-blue-400 mb-8">RAHUL MAIDA STUDY</h1>
                    
                    {step === 1 ? (
                        <div className="space-y-4">
                            <label className="text-xs font-bold text-slate-500 uppercase">Phone Number</label>
                            <input 
                                type="tel" name="p-number" autoComplete="off"
                                className="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-xl outline-none" 
                                placeholder="Enter Number" onChange={e => setPhone(e.target.value)} 
                            />
                            <button onClick={onSend} className="w-full bg-blue-600 p-4 rounded-xl font-bold">Get OTP</button>
                        </div>
                    ) : (
                        <div className="space-y-4">
                            <label className="text-xs font-bold text-slate-500 uppercase">Enter OTP</label>
                            <input 
                                type="text" name="otp-code" autoComplete="one-time-code" inputMode="numeric"
                                className="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-center text-2xl tracking-[10px] outline-none" 
                                placeholder="000000" value={otp} onChange={e => setOtp(e.target.value)} 
                            />
                            <button onClick={onVerify} className="w-full bg-green-600 p-4 rounded-xl font-bold">Verify & Login</button>
                            <p onClick={()=>setStep(1)} className="text-center text-slate-500 text-sm cursor-pointer underline">Back</p>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
