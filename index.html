<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white flex items-center justify-center min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const API_BASE = "https://rahulmaidastudy-backend-1.onrender.com";

        // Generate a stable ID for this login attempt
        const getSessionID = () => {
            let id = sessionStorage.getItem('login_sid');
            if(!id) {
                id = "3d9274e0-556d-4700-ac12-" + Math.random().toString(16).slice(2, 14);
                sessionStorage.setItem('login_sid', id);
            }
            return id;
        };

        function App() {
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [step, setStep] = useState(1);
            const [load, setLoad] = useState(false);
            const [error, setError] = useState('');

            const doSend = async () => {
                setLoad(true); setError('');
                try {
                    const res = await fetch(`${API_BASE}/api/login/send-otp`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ phoneNumber: phone, randomId: getSessionID() })
                    });
                    const d = await res.json();
                    if(d.success) setStep(2); else setError(d.message || "OTP Send Failed");
                } catch(e) { setError("Backend Offline"); }
                setLoad(false);
            };

            const doVerify = async () => {
                setLoad(true); setError('');
                try {
                    const res = await fetch(`${API_BASE}/api/login/verify-otp`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ phoneNumber: phone, otp: otp, randomId: getSessionID() })
                    });
                    const d = await res.json();
                    if(d.success) {
                        alert("LOGIN SUCCESS!");
                        localStorage.setItem('token', d.data.token);
                        window.location.reload();
                    } else { setError(d.message || "Invalid OTP"); }
                } catch(e) { setError("Verify Error"); }
                setLoad(false);
            };

            return (
                <div className="bg-[#111827] p-8 rounded-3xl w-full max-w-sm border border-slate-800">
                    <h1 className="text-xl font-bold text-center text-blue-500 mb-6 underline">STUDY PORTAL LOGIN</h1>
                    
                    {error && <div className="bg-red-900/30 text-red-400 p-3 rounded-lg text-sm mb-4 text-center border border-red-800">{error}</div>}

                    {step === 1 ? (
                        <div className="space-y-4">
                            <input type="tel" maxLength="10" placeholder="Mobile Number" className="w-full bg-black p-4 rounded-xl outline-none border border-slate-700 text-center text-xl" 
                            onChange={e => setPhone(e.target.value)} />
                            <button onClick={doSend} disabled={load} className="w-full bg-blue-600 p-4 rounded-xl font-bold active:bg-blue-800 disabled:opacity-50">
                                {load ? "Sending..." : "Get OTP"}
                            </button>
                        </div>
                    ) : (
                        <div className="space-y-4">
                            <input type="text" maxLength="6" placeholder="Enter OTP" className="w-full bg-black p-4 rounded-xl outline-none border border-slate-700 text-center text-2xl tracking-widest" 
                            autoComplete="off" onChange={e => setOtp(e.target.value)} />
                            <button onClick={doVerify} disabled={load} className="w-full bg-green-600 p-4 rounded-xl font-bold active:bg-green-800 disabled:opacity-50">
                                {load ? "Verifying..." : "Login Now"}
                            </button>
                            <p onClick={()=>setStep(1)} className="text-center text-gray-500 cursor-pointer text-sm">Wrong Number?</p>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
