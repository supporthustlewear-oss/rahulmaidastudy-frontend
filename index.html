<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Maida Study - Learning Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-grad { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: 0.3s; }
        .btn-grad:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- UPDATE THIS URL ---
        const API_BASE = "https://rahulmaidastudy-backend-1.onrender.com"; 

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('token'));
            const [step, setStep] = useState('phone'); // phone, otp
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState('');
            const [loading, setLoading] = useState(false);

            const sendOTP = async () => {
                if(phone.length < 10) return alert("Please enter valid number");
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/api/login/send-otp`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ phoneNumber: phone })
                    });
                    const data = await res.json();
                    if(data.success) setStep('otp');
                    else alert("Failed to send OTP. Try again.");
                } catch (e) { alert("Backend starting... Wait 30 seconds"); }
                setLoading(false);
            };

            const verifyOTP = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/api/login/verify-otp`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ phoneNumber: phone, otp: otp })
                    });
                    const data = await res.json();
                    if(data.success) {
                        localStorage.setItem('token', data.data.token);
                        setIsLoggedIn(true);
                    } else {
                        alert("Wrong OTP!");
                    }
                } catch (e) { alert("Error verifying OTP"); }
                setLoading(false);
            };

            if (isLoggedIn) {
                return (
                    <div className="p-6">
                        <nav className="flex justify-between items-center mb-10 border-b border-slate-700 pb-4">
                            <h1 className="text-2xl font-bold text-blue-400">RAHUL MAIDA STUDY</h1>
                            <button onClick={() => {localStorage.clear(); window.location.reload();}} className="text-red-400 text-sm">Logout</button>
                        </nav>
                        <div className="glass p-10 rounded-2xl text-center">
                            <h2 className="text-3xl font-bold mb-4">Aapka Swagat Hai!</h2>
                            <p className="text-slate-400">Login Successful. Aapka content load ho raha hai...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex items-center justify-center min-h-screen p-4">
                    <div className="glass p-8 rounded-3xl w-full max-w-sm">
                        <h2 className="text-3xl font-bold mb-2 text-center text-blue-400">Rahul Maida Study</h2>
                        <p className="text-slate-400 text-center mb-8 text-sm">Login with PW Mobile Number</p>
                        
                        {step === 'phone' ? (
                            <div>
                                <label className="block text-xs uppercase tracking-widest mb-2 text-slate-500 font-bold">Mobile Number</label>
                                <input 
                                    type="text" maxLength="10" placeholder="7701xxxxxx" 
                                    className="w-full p-4 bg-slate-900/50 border border-slate-700 rounded-xl mb-6 text-white text-xl focus:border-blue-500 outline-none"
                                    onChange={(e) => setPhone(e.target.value)}
                                />
                                <button onClick={sendOTP} disabled={loading} className="w-full btn-grad p-4 rounded-xl font-bold text-lg">
                                    {loading ? 'Bheja ja raha hai...' : 'Get OTP'}
                                </button>
                            </div>
                        ) : (
                            <div>
                                <label className="block text-xs uppercase tracking-widest mb-2 text-slate-500 font-bold">Enter 6-Digit OTP</label>
                                <input 
                                    type="text" maxLength="6" placeholder="000000" 
                                    className="w-full p-4 bg-slate-900/50 border border-slate-700 rounded-xl mb-6 text-white text-center text-3xl tracking-[10px] focus:border-blue-500 outline-none"
                                    onChange={(e) => setOtp(e.target.value)}
                                />
                                <button onClick={verifyOTP} disabled={loading} className="w-full btn-grad p-4 rounded-xl font-bold text-lg">
                                    {loading ? 'Checking...' : 'Verify & Login'}
                                </button>
                                <button onClick={() => setStep('phone')} className="w-full mt-4 text-sm text-slate-500">Change Number</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
